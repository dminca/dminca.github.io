{{ if .Get "src" }}
    <iframe allow="{{ .Get "allow" | default "autoplay *; encrypted-media *; fullscreen *" }}" frameborder="{{ .Get "frameborder" | default "0" }}" height="{{ .Get "height" | default "150" }}" style="{{ .Get "style" | default "width:100%;max-width:660px;overflow:hidden;background:transparent;" | safeCSS }}" sandbox="{{ .Get "sandbox" | default "allow-forms allow-popups allow-same-origin allow-scripts allow-storage-access-by-user-activation allow-top-navigation-by-user-activation" }}" src="https://embed.music.apple.com/de/album/{{ .Get "src" | safeURL }}&l=en"></iframe>
{{ end }}
